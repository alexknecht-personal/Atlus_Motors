<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Altus Motors</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="contact-light-theme">

    <nav class="navbar light-nav">
        <div class="container nav-content">
            <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;"><span class="logo-icon">⊕</span> ALTUS <span class="logo-sub">MOTORS</span></a></div>
            <ul class="nav-links">
                <li><a href="index.html" class="btn-outline light-btn">Back to Home</a></li>
            </ul>
        </div>
    </nav>

    <section class="contact-centered">
        <div class="container flex-center">
            <div class="form-wrapper">
                
                <div class="form-header">
                    <p class="eyebrow">Procurement & Inquiries</p>
                    <h1>Initiate Technical Request</h1>
                    <p class="form-intro">Provide your organizational details below. A technical lead will review your requirements for US-based propulsion components.</p>
                </div>
                
                <form action="#" method="POST" class="altus-form-large">
                    <div class="form-grid-large">
                        <div class="input-group-large">
                            <label for="org">Organization / Agency</label>
                            <input type="text" id="org" name="organization" required>
                        </div>
                        <div class="input-group-large">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="input-group-large">
                            <label for="email">Work Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="input-group-large">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone">
                        </div>
                    </div>

                    <div class="input-group-large full-width">
                        <label for="interest">Area of Interest</label>
                        <select id="interest" name="interest">
                            <option value="custom-propulsion">Custom Engine Design & Prototyping</option>
                            <option value="bulk-components">Domestic Component Fabrication</option>
                            <option value="integration">Full Propulsion Integration</option>
                            <option value="other">General Technical Inquiry</option>
                        </select>
                    </div>

                    <div class="input-group-large full-width">
                        <label for="message">Project Requirements / Brief</label>
                        <textarea id="message" name="message" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn-primary form-submit-large">Submit Request</button>
                </form>

            </div>
        </div>
    </section>

</body>
</html>
